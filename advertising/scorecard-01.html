<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Scorecard Ad</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: rgb(104, 104, 104);
    font-family: Helvetica;
  }

  .ad {
    width: 1.92in;
    height: 0.846in;
    background: #fff;
    color: #24301b;
    padding: 0.035in 0.01in 0.0in 0.013in;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    padding-bottom: 0.0125in;
    margin-top: 1in;
    margin-left: 1in;
  }

  .brand {
    font-size: 0.132in;
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.002in;
    text-transform: uppercase;
    padding-bottom: .01in;
    border-bottom: green 0.02in solid;
  }

  .services {
    font-size: 0.1267in;
    line-height: 1.15;
    font-weight: 700;
    margin-top: 0.015in;
    margin-left: -0.00316in;
    color: green;
    letter-spacing: 0.000in;
  }

  .tagline {
    font-size: 0.077in;
    font-weight: 400;
    letter-spacing: 0.007in;
    text-transform: uppercase;
    color: #6c6c6c;
    margin-top: 0.0125in;
    margin-bottom: 0.0in;
    padding-left: 0.006in;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.04in;
  }

  .contact {
    font-size: 0.1in;
    line-height: 1.15;
    font-weight: 500;
    width: 100%;
    height: 100%;
    margin: 0;
    padding-bottom: 0;
  }

  .web {
    font-weight: 100;
    margin-bottom: 0;
    font-size: 0.125in;
    letter-spacing: .009in;
    padding-left: 0.01in;
  }

  .phone {
    letter-spacing: .02in;
    font-weight: 900;
    font-size: 0.2in;
    width: 100%;
    background-color: green;
    color: #fff;
    margin-left: -0.003in;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 0.00in;
    height: .24in;
    border-radius: .03in;
  }

  .qr {
    width: 0.4in;
    height: 0.4in;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: -0.025in;
    margin-bottom: -0.04in;
  }

  .qr img {
    max-width: 100%;
  }
  .logo {
    width: 0.31in;
    height: 0.31in;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    left: 2.597225in;
    top: 1.2002in;
  }
  .logo img {
    max-width: 100%;
  }
</style>
</head>

<body>
  <div class="ad">
    <div>
      <div class="brand">Abundant Life Land &amp; Tree</div>
      <div class="services">Landscape & Tree Service</div>
      <div class="tagline">Veteran-Owned • Fully Insured</div>
      
    </div>

    <div class="bottom">
      <div class="contact">
        <div class="web">www.AbundantLife.Land</div>
        <div class="phone">405-953-1285</div>
      </div>
      <div class="qr">
        <img src="../img/abundant-life-qr.png" alt="">
      </div>
      <div class="logo">
        <img src="../img/hummingbird-logo-land-conservation-tree-web.png" alt="">
      </div>
    </div>
  </div>
</body>
</html>
